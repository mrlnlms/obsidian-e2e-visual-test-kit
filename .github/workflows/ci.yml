name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install --legacy-peer-deps

      - run: npm install --no-save --legacy-peer-deps @wdio/visual-service wdio-obsidian-service webdriverio

      - run: npm run build
